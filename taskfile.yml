version: '3'

tasks:
  setup:
    desc: Copy headers to mod/include and compile volk static library
    cmds:
      - git submodule update --init --recursive
      - rm -rf ./mod/include
      - mkdir -p ./mod/include
      - cp -r ./mod/Vulkan-Headers/include/. ./mod/include/
      - cp ./mod/volk/volk.h ./mod/include/
      - cp ./mod/volk/volk.c ./mod/include/

  generate:
    desc: Generate the go bindings
    deps: [ 'setup' ]
    cmds:
      - rm -rf ./pkg/raw
      - mkdir -p ./pkg/raw
      - go run ./cmd/gen/main.go
      
  test:
    desc: Test basic vulkan function
    deps: [ 'generate' ]
    cmds:
      - glslc -o ./test/compute/test.spv ./test/compute/test.comp
      - go run ./test/compute/test.go
      - go run ./test/surface/test.go
      