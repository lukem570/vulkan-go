version: '3'

tasks:
  generate:
    desc: Generate the go bindings
    cmds:
      - rm -rf ./pkg/raw
      - mkdir -p ./pkg/raw
      - go run ./cmd/gen/main.go
      
  test:
    desc: Test basic vulkan function
    deps: [ 'generate' ]
    cmds:
      - glslc -o ./test/compute/test.spv ./test/compute/test.comp
      - go run ./test/compute/test.go
      - go run ./test/surface/test.go
      